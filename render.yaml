services:
  - type: web
    name: budget-app
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: SECURE_COOKIES
        value: "true"
      - key: ALLOWED_ORIGINS
        value: "https://budget-app.onrender.com"
      - key: REGISTRATION_OPEN
        value: "true"
      - key: APP_URL
        value: "https://budget-app.onrender.com"
      - key: SMTP_HOST
        value: ""
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        value: ""
      - key: SMTP_PASSWORD
        value: ""
      - key: FROM_EMAIL
        value: ""
      - key: PLAID_CLIENT_ID
        value: ""
      - key: PLAID_SECRET
        value: ""
      - key: PLAID_ENV
        value: "sandbox"
